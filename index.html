<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetraMarga - Eye Health Reminder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-focus">

    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">NetraMarga</h1>
            <div class="nav-buttons">
                <button id="reportBtn" class="nav-btn">📊 Report</button>
                <button id="settingBtn" class="nav-btn">⚙️ Setting</button>
                <button class="nav-btn profile-btn">👤</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <p class="subtitle">Eye Health Reminder</p>
        
        <div class="mode-tabs">
            <button class="mode-tab active" id="focusMode">Focus</button>
            <button class="mode-tab" id="breakMode">Break</button>
        </div>

        <div class="timer-card">
            <h2 id="session-type">Focus Session</h2>
            <div id="timer">20:00</div>
        </div>

        <div class="controls">
            <button id="startBtn">START</button>
        </div>

        <div class="progress-container">
            <div id="progress"></div>
        </div>

        <p id="desc">Focus on your work for 20 minutes 🎯</p>
    </main>

    <!-- Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Productivity Report</h3>
                <span class="close-modal" id="closeReport">&times;</span>
            </div>
            <div class="report-stats">
                <div class="stat-item">
                    <span class="stat-label">Focus Sessions</span>
                    <span class="stat-value" id="stats-focus">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Focus Time</span>
                    <span class="stat-value" id="stats-time">0m</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Alarm Audio -->
    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
